name: iOS build

# Manual only — macOS runner minutes are limited, so nothing runs automatically.
# "smoke"   = compile unsigned (no Apple account needed) to catch build breakage.
# "release" = brand the app, sign with the App Store Connect API key, upload to TestFlight.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke (compile only) or release (signed + TestFlight)"
        type: choice
        options: [smoke, release]
        default: smoke

jobs:
  build:
    runs-on: macos-15  # Xcode 16 — Capacitor 8 requires Xcode 16+
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps + generate iOS project
        run: |
          npm ci
          npm run sync:web
          npx cap add ios
          npx cap sync ios
          # Capacitor 8 uses Swift Package Manager (no Podfile); run pods only if one exists.
          if [ -f ios/App/Podfile ]; then (cd ios/App && pod install); fi

      # ---------- smoke ----------
      - name: Smoke build (simulator, unsigned)
        if: ${{ github.event.inputs.mode == 'smoke' }}
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Debug \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build

      # ---------- release ----------
      - name: Brand + compliance (icon, splash, encryption flag)
        if: ${{ github.event.inputs.mode == 'release' }}
        run: |
          npx capacitor-assets generate --ios
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Build + upload to TestFlight
        if: ${{ github.event.inputs.mode == 'release' }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          echo "shape check (no secret values printed):"
          echo "  KEY_ID length=${#APPSTORE_KEY_ID} (10) · ISSUER length=${#APPSTORE_ISSUER_ID} (36) · TEAM length=${#APPLE_TEAM_ID} (10)"
          echo "  MATCH_GIT_URL length=${#MATCH_GIT_URL} · MATCH_PASSWORD length=${#MATCH_PASSWORD} · MATCH_GIT_TOKEN length=${#MATCH_GIT_TOKEN}"
          bundle install
          bundle exec fastlane beta
