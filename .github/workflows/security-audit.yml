name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "app/package.json"
      - "app/package-lock.json"
      - ".github/workflows/security-audit.yml"
  pull_request:
    paths:
      - "app/package.json"
      - "app/package-lock.json"
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (iOS wrapper)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Fail the build on a high or critical advisory; report lower severities.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
