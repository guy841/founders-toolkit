version: 2
updates:
  # iOS wrapper npm dependencies (Capacitor toolchain)
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      capacitor:
        patterns:
          - "@capacitor/*"

  # GitHub Actions used in CI/release
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Ruby tooling for iOS release (Fastlane)
  - package-ecosystem: "bundler"
    directory: "/app"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
